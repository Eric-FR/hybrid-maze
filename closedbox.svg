<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
  </defs>

  <!-- Outline of a simple closed box (cube) -->
  <g stroke="#222" stroke-width="3" fill="url(#grad)">
    <polygon points="100,220 200,180 300,220 200,260" />
    <polygon points="100,220 100,120 200,80 200,180" />
    <polygon points="200,180 200,80 300,120 300,220" />
  </g>

  <!-- Details -->
  <g stroke="#222" stroke-width="2" fill="none">
    <polyline points="100,220 100,120 200,80 300,120 300,220" />
    <line x1="100" y1="120" x2="200" y2="80" />
    <line x1="200" y1="80" x2="300" y2="120" />
    <line x1="200" y1="180" x2="200" y2="80" />
  </g>

  <text x="200" y="305" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Closed box (example)</text>
</svg>
